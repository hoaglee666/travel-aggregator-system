<div class="max-w-6xl mx-auto p-6 font-sans">
  <div class="bg-blue-600 rounded-xl p-8 mb-8 text-white shadow-lg">
    <h1 class="text-3xl font-bold mb-4">Find Your Perfect Stay</h1>

    <form [formGroup]="searchForm" (ngSubmit)="onSubmit()" class="flex flex-col md:flex-row gap-4">
      <select
        formControlName="destination"
        class="flex-1 px-4 py-3 rounded-lg text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-300"
      >
        <optgroup *ngFor="let region of regions" [label]="region.countryName">
          <option *ngFor="let city of region.cities" [value]="city">
            {{ city }}
          </option>
        </optgroup>
      </select>

      <select
        formControlName="sort"
        class="px-4 py-3 rounded-lg text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-300"
      >
        <option value="price">Lowest Price</option>
        <option value="rating">Highest Rating</option>
      </select>

      <button
        type="submit"
        class="bg-orange-500 hover:bg-orange-600 px-8 py-3 rounded-lg font-bold transition duration-200"
      >
        Search
      </button>
    </form>
  </div>

  <div *ngIf="isLoading" class="text-center py-10 text-xl text-gray-500 font-semibold">
    Aggregating best deals from partners...
  </div>

  <div *ngIf="!isLoading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <div
      *ngFor="let hotel of hotels"
      class="bg-white border rounded-xl overflow-hidden shadow-sm hover:shadow-md transition duration-200 flex flex-col"
    >
      <div class="h-48 bg-gray-200 flex items-center justify-center text-gray-400">
        [ Image of {{ hotel.name }} ]
      </div>

      <div class="p-5 flex-1 flex flex-col justify-between">
        <div>
          <div class="flex justify-between items-start mb-2">
            <h2 class="text-xl font-bold text-gray-800">{{ hotel.name }}</h2>
            <span class="bg-blue-100 text-blue-800 text-xs font-bold px-2 py-1 rounded">
              {{ hotel.rating }} ⭐
            </span>
          </div>
          <p class="text-gray-500 text-sm mb-4">📍 {{ hotel.destination }}</p>
        </div>

        <div class="mt-4 pt-4 border-t flex justify-between items-center">
          <div>
            <p class="text-xs text-gray-500 uppercase tracking-wide">Provided by</p>
            <p class="font-semibold text-gray-700">{{ hotel.provider }}</p>
          </div>
          <div class="text-right">
            <p class="text-2xl font-bold text-green-600">{{ hotel.price | number }} ₫</p>

            <div class="flex flex-col gap-2 mt-2">
              <button class="text-sm bg-blue-600 text-white px-4 py-1.5 rounded hover:bg-blue-700">
                View Deal
              </button>

              <button
                *ngIf="isLoggedIn"
                (click)="onTrackPrice(hotel)"
                class="text-sm bg-orange-500 text-white px-4 py-1.5 rounded hover:bg-orange-600 flex items-center justify-center gap-1"
              >
                <span>🔔</span> Track Price Drop
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
